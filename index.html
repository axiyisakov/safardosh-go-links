<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safardosh Go</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #f0f4ff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      padding: 2rem 1.75rem;
      max-width: 340px;
      width: 90%;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #00d4aa;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    .icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .otp-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: #8892a4;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .otp-code {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f0f4ff;
      letter-spacing: 0.2em;
      margin-bottom: 1.5rem;
    }

    .open-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 0.9rem 1.25rem;
      border-radius: 12px;
      background: #00d4aa;
      color: #0f1117;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 1.25rem;
      transition: opacity 0.15s;
    }
    .open-btn:active { opacity: 0.8; }

    .divider {
      font-size: 0.72rem;
      color: #8892a4;
      margin-bottom: 0.75rem;
    }

    .store-links { display: flex; gap: 0.5rem; flex-direction: column; }

    .store-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.7rem 1rem; border-radius: 10px;
      font-size: 0.8rem; font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: #8892a4;
      background: rgba(255,255,255,0.04);
    }

    .error { color: #8892a4; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Safardosh Go</div>

    <div class="icon" id="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="#00d4aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      </svg>
    </div>

    <div class="otp-label" id="otpLabel"></div>
    <div class="otp-code"  id="otpCode"></div>

    <a class="open-btn" id="openBtn" href="#">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Ilovani ochish
    </a>

    <div class="divider">Ilova yo'qmi?</div>
    <div class="store-links">
      <a class="store-btn" id="androidBtn" href="#">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.523 15.34 19.937 11l-2.414-4.34A1 1 0 0 0 16.65 6H7.35a1 1 0 0 0-.873.66L4.063 11l2.414 4.34A1 1 0 0 0 7.35 16h9.3a1 1 0 0 0 .873-.66z"/>
        </svg>
        Google Play
      </a>
      <a class="store-btn" id="iosBtn" href="#">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        App Store
      </a>
    </div>
  </div>

  <script>
    const PLAY_STORE = "https://play.google.com/store/apps/details?id=com.axiydev.safarbargo";
    const APP_STORE  = "https://apps.apple.com/app/idXXXXXXXX";
    const SCHEME     = "safardoshgo";
    const PACKAGE    = "com.axiydev.safarbargo";
    const isAndroid  = /android/i.test(navigator.userAgent);

    const params = new URLSearchParams(window.location.search);
    const code   = params.get("code")   || '';
    const number = params.get("number") || '';

    document.getElementById('androidBtn').href = PLAY_STORE;
    document.getElementById('iosBtn').href     = APP_STORE;

    if (code || number) {
      if (code) {
        document.getElementById('otpLabel').textContent = "Tasdiqlash kodi";
        document.getElementById('otpCode').textContent  = code;
      }

      const query = "number=" + encodeURIComponent(number) + "&code=" + encodeURIComponent(code);

      const deepLink = isAndroid
        ? "intent://auth?" + query +
          "#Intent;scheme=" + SCHEME +
          ";package=" + PACKAGE +
          ";S.browser_fallback_url=" + encodeURIComponent(PLAY_STORE) + ";end"
        : SCHEME + "://auth?" + query;

      document.getElementById('openBtn').href = deepLink;
    } else {
      document.getElementById('icon').style.display    = 'none';
      document.getElementById('otpCode').style.display = 'none';
      document.getElementById('otpLabel').style.display = 'none';
      document.getElementById('openBtn').style.display = 'none';
      document.querySelector('.divider').style.display = 'none';
      const err = document.createElement('p');
      err.className = 'error';
      err.textContent = "Havola noto'g'ri yoki eskirgan";
      document.querySelector('.card').insertBefore(err, document.getElementById('androidBtn').parentElement);
    }
  </script>
</body>
</html>
