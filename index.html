<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safardosh Go</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --accent: #00d4aa;
      --accent2: #7c6af7;
      --text: #f0f4ff;
      --muted: #8892a4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0,212,170,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(124,106,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 380px;
      width: 90%;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2.5rem;
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    .icon-otp {
      background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(124,106,247,0.15));
      border: 1px solid rgba(0,212,170,0.3);
    }

    .icon-phone {
      background: linear-gradient(135deg, rgba(124,106,247,0.15), rgba(0,212,170,0.15));
      border: 1px solid rgba(124,106,247,0.3);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,170,0.2); }
      50%       { box-shadow: 0 0 0 12px rgba(0,212,170,0); }
    }

    .value {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .value-otp   { font-size: 2.8rem; letter-spacing: 0.15em; }
    .value-phone { font-size: 1.6rem; letter-spacing: 0.05em; }

    .status {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .sub {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,212,170,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .store-links {
      display: none;
      gap: 1rem;
      margin-top: 2rem;
      flex-direction: column;
    }

    .store-links.show { display: flex; }

    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.85rem 1.5rem;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      transition: transform 0.15s;
    }

    .store-btn:hover { transform: scale(1.02); }
    .btn-android { background: linear-gradient(135deg, #00d4aa, #00a882); color: #0a0f1e; }
    .btn-ios     { background: linear-gradient(135deg, #7c6af7, #5a48d4); color: #fff; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="logo">Safardosh Go</div>
    <div class="tagline" id="tagline"></div>

    <div class="icon-wrap" id="iconWrap">
      <svg id="iconSvg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </div>

    <div class="value" id="valueDisplay"></div>
    <div class="status" id="status">Ilova ochilmoqda...</div>
    <div class="sub" id="sub"></div>
    <div class="spinner" id="spinner"></div>

    <div class="store-links" id="storeLinks">
      <a class="store-btn btn-android" id="androidBtn" href="#">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.523 15.34 19.937 11l-2.414-4.34A1 1 0 0 0 16.65 6H7.35a1 1 0 0 0-.873.66L4.063 11l2.414 4.34A1 1 0 0 0 7.35 16h9.3a1 1 0 0 0 .873-.66z"/></svg>
        Google Play dan yuklash
      </a>
      <a class="store-btn btn-ios" id="iosBtn" href="#">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        App Store dan yuklash
      </a>
    </div>
  </div>

  <script>
    const PLAY_STORE = "https://play.google.com/store/apps/details?id=com.axiydev.safarbargo";
    const APP_STORE  = "https://apps.apple.com/app/idXXXXXXXX";
    const ua         = navigator.userAgent;

    const params = new URLSearchParams(window.location.search);
    const code   = params.get("code");
    const number = params.get("number");

    document.getElementById('androidBtn').href = PLAY_STORE;
    document.getElementById('iosBtn').href     = APP_STORE;

    let valid = code || number;

    if (valid) {
      // Icon — OTP va phone ikkalasi bor
      document.getElementById('tagline').textContent = "Tasdiqlash";
      document.getElementById('iconWrap').classList.add('icon-otp');
      document.getElementById('iconSvg').setAttribute('stroke', '#00d4aa');
      document.getElementById('iconSvg').innerHTML = `
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      `;

      // Ko'rsatiladigan qiymat: OTP + telefon
      let display = '';
      if (code)   display += code;
      if (number) {
        if (display) display += '\n';
        display += number.replace(/(\d{3})(\d{2})(\d{3})(\d{2})(\d{2})/, '+$1 $2 $3 $4 $5');
      }
      document.getElementById('valueDisplay').classList.add('value-otp');
      document.getElementById('valueDisplay').style.whiteSpace = 'pre';
      document.getElementById('valueDisplay').textContent = display;
      document.getElementById('sub').textContent = "Safardosh Go da tasdiqlash amalga oshirilmoqda";

      // Deep link — ikkalasini birga yuborish
      let deepLink;
      if (/android/i.test(ua)) {
        deepLink = "intent://auth?code=" + (code || '') + "&number=" + (number || '') +
                   "#Intent;scheme=safardosh_go;package=com.axiydev.safarbargo;end";
      } else {
        deepLink = "safardosh_go://auth?code=" + (code || '') + "&number=" + (number || '');
      }
      window.location.href = deepLink;

      setTimeout(() => {
        if (!document.hidden) {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('status').textContent    = "Ilova topilmadi";
          document.getElementById('sub').textContent       = "Safardosh Go ni yuklab oling";
          document.getElementById('storeLinks').classList.add('show');

          if (/android/i.test(ua)) {
            window.location.href = PLAY_STORE;
          } else if (/iphone|ipad/i.test(ua)) {
            window.location.href = APP_STORE;
          }
        }
      }, 2500);

    } else {
      document.getElementById('tagline').textContent    = "Aqlli safar hamrohi";
      document.getElementById('iconWrap').style.display = 'none';
      document.getElementById('status').textContent     = "Noto'g'ri havola";
      document.getElementById('sub').textContent        = "Bu havola noto'g'ri yoki eskirgan";
      document.getElementById('spinner').style.display  = 'none';
      document.getElementById('storeLinks').classList.add('show');
    }
  </script>
</body>
</html>
